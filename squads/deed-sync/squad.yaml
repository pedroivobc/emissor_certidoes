pipeline: pipeline/pipeline.yaml

skills:
  - playwright
  - 2captcha

data: []

config:
  output_dir: output/pdfs
  solicitante_fixo:
    nome: Pedro Ivo Batista Clemente
    cpf: "117.731.056-20"
    email: contato@clementeassessoria.com

env:
  - TWOCAPTCHA_API_KEY
  - GOOGLE_DRIVE_FOLDER_ID
