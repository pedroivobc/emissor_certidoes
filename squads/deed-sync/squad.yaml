name: deed-sync
code: deed-sync
description: >
  Automatiza a emissão de 6 certidões de pessoa física brasileira
  (TST, TRF6 eproc, TRF6 PJE, TRT3, TJMG/RUPE, Receita Federal PGFN)
  via uma API FastAPI local, usando Playwright e 2captcha.
  Os PDFs gerados são salvos em pasta local sincronizada com o Google Drive.
icon: 📄
